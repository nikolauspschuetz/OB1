# Open Brain — local Docker Compose stack.
# Boots Postgres + pgvector and the MCP server. Reads config from .env (or
# .env.<profile> when invoked via `make up PROFILE=foo`).
#
# All containers and the data volume are named by Docker Compose's project
# (default `ob1`, or `ob1-<profile>` via `docker compose -p`), so multiple
# stacks can run side-by-side without name collisions.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-openbrain}
      POSTGRES_USER: ${DB_USER:-openbrain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - ob1-db-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openbrain} -d ${DB_NAME:-openbrain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-openbrain}
      DB_USER: ${DB_USER:-openbrain}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      MCP_ACCESS_KEY: ${MCP_ACCESS_KEY:?MCP_ACCESS_KEY must be set in .env}
      MCP_PORT: 8000
      LLM_MOCK: ${LLM_MOCK:-false}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET:-}
      SENTRY_WEBHOOK_SECRET: ${SENTRY_WEBHOOK_SECRET:-}
      GENERIC_WEBHOOK_SECRET: ${GENERIC_WEBHOOK_SECRET:-}
      GENERIC_WEBHOOK_CONTENT_PATH: ${GENERIC_WEBHOOK_CONTENT_PATH:-}
      GENERIC_WEBHOOK_METADATA_PATH: ${GENERIC_WEBHOOK_METADATA_PATH:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      EMBEDDING_STALE_SECONDS: ${EMBEDDING_STALE_SECONDS:-0}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://models.github.ai/inference}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      CHAT_API_BASE: ${CHAT_API_BASE:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-openai/gpt-4o-mini}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
    ports:
      - "${MCP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "deno eval \"const r = await fetch('http://127.0.0.1:8000/healthz'); Deno.exit(r.ok ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # Entity-extraction worker — opt-in via `WORKER=1 make up`. Polls
  # public.entity_extraction_queue, drains pending rows, writes entities +
  # thought_entities + thought_entity_edges. Layer-2 trigger maintains
  # edges.support_count as an aggregate. See server/worker.ts.
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    profiles: ["worker"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command:
      ["deno", "run", "--allow-net", "--allow-env", "--allow-read", "worker.ts"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-openbrain}
      DB_USER: ${DB_USER:-openbrain}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-10000}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      MIN_LINKED_FOR_WIKI: ${MIN_LINKED_FOR_WIKI:-3}
      WORK_CONTEXT_DESC: ${WORK_CONTEXT_DESC:-}
      PERSONAL_CONTEXT_DESC: ${PERSONAL_CONTEXT_DESC:-}
      WIKI_DISABLE: ${WIKI_DISABLE:-false}
      WIKI_MAX_LINKED: ${WIKI_MAX_LINKED:-200}
      WIKI_TEMPERATURE: ${WIKI_TEMPERATURE:-0.3}
      WIKI_MAX_TOKENS: ${WIKI_MAX_TOKENS:-4096}
      LLM_MOCK: ${LLM_MOCK:-false}
      LLM_TRACE: ${LLM_TRACE:-false}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://models.github.ai/inference}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-openai}
      CHAT_API_BASE: ${CHAT_API_BASE:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-openai/gpt-4o-mini}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}

  # LiteLLM gateway — runs under the `bedrock` profile (real AWS) or
  # `ci-bedrock` profile (mock-openai upstream, no AWS creds needed).
  # Bring up with: BACKEND=bedrock make up
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    profiles: ["bedrock", "ci-bedrock"]
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./ci/litellm-config.yaml:/app/config.yaml:ro
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      MOCK_OPENAI_URL: ${MOCK_OPENAI_URL:-http://mock-openai:4001}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/liveliness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # Mock OpenAI-compatible upstream for `make smoke-bedrock`. Only runs
  # under the `ci-bedrock` profile. Lets us validate the LiteLLM wiring
  # without real AWS credentials.
  mock-openai:
    image: denoland/deno:2.3.3
    profiles: ["ci-bedrock"]
    restart: unless-stopped
    command: ["run", "--allow-net", "--allow-env", "/app/mock-openai.ts"]
    volumes:
      - ./ci/mock-openai.ts:/app/mock-openai.ts:ro
    environment:
      PORT: "4001"
    ports:
      - "${MOCK_OPENAI_PORT:-4001}:4001"
    healthcheck:
      test: ["CMD-SHELL", "deno eval \"const r = await fetch('http://127.0.0.1:4001/healthz'); Deno.exit(r.ok ? 0 : 1)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Next.js dashboard — opt-in via `DASHBOARD=1 make up`. Read path
  # talks directly to Postgres; write path POSTs to the MCP server's
  # tool surface so we never duplicate business logic.
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    profiles: ["dashboard"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mcp:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-openbrain}
      DB_USER: ${DB_USER:-openbrain}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      OB1_MCP_URL: http://mcp:8000
      OB1_MCP_KEY: ${MCP_ACCESS_KEY:?MCP_ACCESS_KEY must be set in .env}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?DASHBOARD_PASSWORD must be set in .env to enable the dashboard profile}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-${MCP_ACCESS_KEY}}
      DASHBOARD_SESSION_MAX_AGE: ${DASHBOARD_SESSION_MAX_AGE:-604800}
      # Own profile name + peer list (computed by the Makefile). The
      # peer list is consumed by the nav to render a Slack-style
      # profile switcher. Empty when only one profile is configured.
      OB1_PROFILE: ${OB1_PROFILE:-default}
      OB1_PEER_PROFILES: ${OB1_PEER_PROFILES:-}
      # When set, the dashboard signs cookies scoped to this domain so
      # the session is shared across subdomains (e.g. .ob1.localhost).
      # Empty = host-only cookie (per-port shape, today's default).
      # Populated by docker-compose.gateway.yml when GATEWAY=1.
      OB1_COOKIE_DOMAIN: ${OB1_COOKIE_DOMAIN:-}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  ob1-db-data: {}
